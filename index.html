<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#ff6b4a"/><meta name="description" content="Kana Master：用外型聯想、SM-2 間隔重複與弱點練習，真正記住平假名與片假名。"/><link rel="manifest" href="manifest.webmanifest"/><link rel="stylesheet" href="styles.css"/><link rel="stylesheet" href="mnemonics.css"/><link rel="stylesheet" href="kana-master.css"/><link rel="stylesheet" href="quiz.css"/><link rel="stylesheet" href="curriculum.css"/><link rel="stylesheet" href="progress-map.css"/><title>Kana Master｜五十音記憶訓練</title></head><body><main class="shell"><header class="topbar"><div><p class="eyebrow">Learn Japanese by shape</p><h1>Kana Master</h1></div><button id="settingsBtn" class="ghost">設定</button></header><section id="loginView" class="panel auth-panel"><h2>每天幾分鐘，真正記住五十音</h2><p>透過外型聯想與間隔重複，從看得懂到不再忘記。輸入學習 ID 即可保留這台裝置上的個人進度。</p><label>學習 ID<input id="userIdInput" autocomplete="username" maxlength="40" placeholder="例如 david"/></label><button id="loginBtn" class="primary">開始學習</button><p class="hint">不需要密碼，資料只存在這台瀏覽器。換裝置前請先匯出備份。</p></section><section id="appView" hidden><section class="status-row"><div><span class="label">學習者</span><strong id="currentUser"></strong></div><div><span class="label">今日複習</span><strong id="todayCount">0</strong></div><div><span class="label">連續天數</span><strong><span id="streakCount">0</span> 🔥</strong></div><div><span class="label">弱點字</span><strong id="weakCount">0</strong></div></section><section class="dashboard panel"><div><span class="label">今日進度</span><strong id="dailyProgressLabel">今日完成 0 次複習</strong><div class="progress-track"><div id="dailyProgress"></div></div></div><div class="mini-stats"><span>到期 <b id="dueCount">0</b></span><span>已學 <b id="learnedCount">0</b></span><span>今日正確率 <b id="accuracyCount">—</b></span></div></section><section class="mode-tabs"><button class="tab active" data-script="hiragana">平假名</button><button class="tab" data-script="katakana">片假名</button><button class="tab" data-script="mixed">混合</button></section><section class="practice-tabs"><button id="dailyModeBtn" class="practice-mode active">今日學習</button><button id="infiniteModeBtn" class="practice-mode">無限練習</button><button id="weakModeBtn" class="practice-mode">弱點模式</button><button id="quizModeBtn" class="practice-mode">選擇題</button></section><section id="emptyState" class="panel empty" hidden><h2>還沒有選擇卡片</h2><p>先到設定中勾選要學的假名列。</p><button id="emptySettingsBtn" class="primary">選擇學習範圍</button></section><section id="studyPanel" class="study-wrap"><div class="progress-track"><div id="progressBar"></div></div><p id="queueLabel" class="queue-label"></p><button id="card" class="card" aria-live="polite"><span id="cardPrompt" class="kana"></span><span id="cardHint" class="card-hint">點一下看答案與記憶法</span><span id="cardAnswer" class="answer" hidden></span></button><div id="ratingButtons" class="ratings" hidden><button data-rating="again" class="rating again"><span>重來</span><small>&lt; 1 分鐘</small></button><button data-rating="hard" class="rating hard"><span>困難</span><small id="hardInterval"></small></button><button data-rating="good" class="rating good"><span>記得</span><small id="goodInterval"></small></button><button data-rating="easy" class="rating easy"><span>簡單</span><small id="easyInterval"></small></button></div><div id="completeActions" class="complete-actions" hidden><button id="continuePracticeBtn" class="primary">繼續無限練習</button><button id="restartDailyBtn" class="ghost">重新練今天內容</button></div></section></section></main><dialog id="settingsDialog"><form method="dialog" class="dialog-inner"><header class="dialog-head"><div><p class="eyebrow">Learning scope</p><h2>學習設定</h2></div><button value="cancel" class="ghost">關閉</button></header><section><h3>選擇要加入的列</h3><div id="rowSelector" class="row-selector"></div></section><section class="settings-grid"><label>每天最多新卡<input id="newLimitInput" type="number" min="1" max="50" value="10"/></label><label>每次最多複習<input id="reviewLimitInput" type="number" min="5" max="200" value="50"/></label></section><section><h3>資料管理</h3><div class="action-row"><button id="exportBtn" type="button">匯出備份</button><label class="file-label">匯入備份<input id="importInput" type="file" accept="application/json"/></label><button id="switchUserBtn" type="button">切換使用者</button><button id="resetBtn" type="button" class="danger-outline">重設目前進度</button></div></section><button id="saveSettingsBtn" value="default" class="primary full">儲存設定</button></form></dialog><script src="mnemonics.js"></script><script src="app.js"></script><script src="curriculum.js"></script><script src="mnemonics-ui.js"></script><script src="quiz.js"></script><script src="progress-map.js"></script></body></html>
